version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: slooze_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slooze_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slooze_pass}
      POSTGRES_DB: ${POSTGRES_DB:-slooze_db}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slooze_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - slooze_network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slooze_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-slooze_user}:${POSTGRES_PASSWORD:-slooze_pass}@postgres:5432/${POSTGRES_DB:-slooze_db}
      SECRET_KEY: ${SECRET_KEY:-09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - slooze_network
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Seeding database...' &&
        python scripts/seed_data.py &&
        echo 'Starting application...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data_prod:
    driver: local

networks:
  slooze_network:
    driver: bridge
