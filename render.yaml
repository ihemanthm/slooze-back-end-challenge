services:
  # PostgreSQL Database
  - type: pserv
    name: slooze-postgres
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile.postgres
    disk:
      name: slooze-db-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1

  # FastAPI Application
  - type: web
    name: slooze-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: slooze-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
    buildCommand: |
      alembic upgrade head
      python scripts/seed_data.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

databases:
  - name: slooze-db
    databaseName: slooze_db
    user: slooze_user
    plan: free
